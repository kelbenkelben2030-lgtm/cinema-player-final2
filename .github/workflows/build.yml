name: Build APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Clean Old Manifests
        # Скрипт сам удаляет дубликаты манифестов, из-за которых была ошибка
        run: |
          rm -f app/src/main/AndroidManifest.xml || true
          rm -f AndroidManifest.xml || true
          mkdir -p app/src/main
          
          # Записываем один чистый манифест, который точно примет Google
          cat << 'EOF' > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://android.com" package="com.love.cinemaplayer">
              <uses-permission android:name="android.permission.INTERNET" />
              <application android:allowBackup="true" android:label="Cinema Player" android:theme="@android:style/Theme.NoTitleBar.Fullscreen">
                  <activity android:name="com.love.cinemaplayer.MainActivity" android:exported="true" android:screenOrientation="landscape">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Setup Gradle Wrapper Automatically
        run: gradle wrapper --gradle-version 8.5

      - name: Setup Gradle Automation
        uses: gradle/actions/setup-gradle@v3

      - name: Build APK with Gradle
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: cinema-player-apk
          path: app/build/outputs/apk/debug/*.apk
