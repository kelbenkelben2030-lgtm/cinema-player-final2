name: Build APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Force Generate Project Files
        run: |
          # Полностью очищаем весь старый мусор в репозитории
          rm -rf app settings.gradle build.gradle compile.py builder.py || true
          mkdir -p app/src/main/java/com/love/cinemaplayer

      - name: Write Android Manifest
        uses: 1arp/create-file@v1.1.4
        with:
          path: 'app/src/main/AndroidManifest.xml'
          content: |
            <?xml version="1.0" encoding="utf-8"?>
            <manifest xmlns:android="http://android.com" package="com.love.cinemaplayer">
                <uses-permission android:name="android.permission.INTERNET" />
                <application android:allowBackup="true" android:label="Cinema Player" android:theme="@android:style/Theme.NoTitleBar.Fullscreen">
                    <activity android:name="com.love.cinemaplayer.MainActivity" android:exported="true" android:screenOrientation="landscape">
                        <intent-filter>
                            <action android:name="android.intent.action.MAIN" />
                            <category android:name="android.intent.category.LAUNCHER" />
                        </intent-filter>
                    </activity>
                </application>
            </manifest>

      - name: Write MainActivity Java
        uses: 1arp/create-file@v1.1.4
        with:
          path: 'app/src/main/java/com/love/cinemaplayer/MainActivity.java'
          content: |
            package com.love.cinemaplayer;
            import android.app.Activity;
            import android.net.Uri;
            import android.os.Bundle;
            import android.view.View;
            import android.widget.TextView;
            import android.widget.VideoView;
            import org.eclipse.paho.client.mqttv3.*;
            import org.json.JSONObject;

            public class MainActivity extends Activity {
                private VideoView videoPlayer;
                private TextView infoLabel;
                private MqttAsyncClient client;

                @Override
                protected void onCreate(Bundle savedInstanceState) {
                    super.onCreate(savedInstanceState);
                    videoPlayer = new VideoView(this);
                    infoLabel = new TextView(this);
                    infoLabel.setText("🎬 WAITING FOR HOST SIGNAL...");
                    infoLabel.setTextSize(20);
                    infoLabel.setTextColor(0xFF89B4FA);
                    
                    android.widget.RelativeLayout layout = new android.widget.RelativeLayout(this);
                    layout.setBackgroundColor(0xFF11111B);
                    
                    android.widget.RelativeLayout.LayoutParams params = new android.widget.RelativeLayout.LayoutParams(
                        android.widget.RelativeLayout.LayoutParams.WRAP_CONTENT, android.widget.RelativeLayout.LayoutParams.WRAP_CONTENT);
                    params.addRule(android.widget.RelativeLayout.CENTER_IN_PARENT);
                    layout.addView(infoLabel, params);
                    layout.addView(videoPlayer, new android.widget.RelativeLayout.LayoutParams(
                        android.widget.RelativeLayout.LayoutParams.MATCH_PARENT, android.widget.RelativeLayout.LayoutParams.MATCH_PARENT));
                    videoPlayer.setVisibility(View.GONE);
                    setContentView(layout);
                    startMqtt();
                }

                private void startMqtt() {
                    try {
                        String clientId = MqttClient.generateClientId();
                        client = new MqttAsyncClient("tcp://broker.emqx.io:1883", clientId, null);
                        MqttConnectOptions options = new MqttConnectOptions();
                        options.setAutomaticReconnect(true);
                        options.setCleanSession(true);
                        client.connect(options, null, new IMqttActionListener() {
                            @Override public void onSuccess(IMqttToken token) { try { client.subscribe("my_cinema/love_cinema_room_secret_999/control", 1); } catch (Exception e) {} }
                            @Override public void onFailure(IMqttToken asyncActionToken, Throwable exception) {}
                        });
                        client.setCallback(new MqttCallbackExtended() {
                            @Override public void connectComplete(boolean reconnect, String serverURI) {}
                            @Override public void connectionLost(Throwable cause) {}
                            @Override public void deliveryComplete(IMqttDeliveryToken token) {}
                            @Override
                            public void messageArrived(String topic, MqttMessage message) throws Exception {
                                JSONObject data = new JSONObject(new String(message.getPayload()));
                                final String action = data.getString("action");
                                final String url = data.optString("url", "");
                                runOnUiThread(() -> {
                                    if (action.equals("load") && !url.isEmpty()) {
                                        infoLabel.setVisibility(View.GONE);
                                        videoPlayer.setVisibility(View.VISIBLE);
                                        videoPlayer.setVideoURI(Uri.parse(url));
                                        videoPlayer.start();
                                    } else if (action.equals("play")) { videoPlayer.start(); }
                                    else if (action.equals("pause")) { videoPlayer.pause(); }
                                });
                            }
                        });
                    } catch (Exception e) {}
                }
            }

      - name: Write Settings Gradle
        uses: 1arp/create-file@v1.1.4
        with:
          path: 'settings.gradle'
          content: |
            include ':app'

      - name: Write Root Build Gradle
        uses: 1arp/create-file@v1.1.4
        with:
          path: 'build.gradle'
          content: |
            buildscript {
                repositories { google(); mavenCentral() }
                dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
            }
            allprojects { repositories { google(); mavenCentral() } }

      - name: Write App Build Gradle
        uses: 1arp/create-file@v1.1.4
        with:
          path: 'app/build.gradle'
          content: |
            plugins { id 'com.android.application' }
            android {
                namespace 'com.love.cinemaplayer'
                compileSdk 34
                defaultConfig {
                    applicationId "com.love.cinemaplayer"
                    minSdk 21
                    targetSdk 34
                    versionCode 1
                    versionName "1.0"
                }
            }
            dependencies { implementation 'org.eclipse.paho:org.eclipse.paho.client.mqttv3:1.2.5' }

      - name: Setup Gradle Wrapper Automatically
        run: gradle wrapper --gradle-version 8.5

      - name: Setup Gradle Automation
        uses: gradle/actions/setup-gradle@v3

      - name: Build APK with Gradle
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: cinema-player-apk
          path: app/build/outputs/apk/debug/*.apk
