name: Build APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Force Generate Perfect Project
        run: |
          # Исправлено: Полностью стираем старую папку app, чтобы избавиться от кривого манифеста
          rm -rf app settings.gradle build.gradle compile.py builder.py || true
          
          mkdir -p app/src/main/java/com/love/cinemaplayer
          
          echo '<?xml version="1.0" encoding="utf-8"?>' > app/src/main/AndroidManifest.xml
          echo '<manifest xmlns:android="http://android.com" package="com.love.cinemaplayer">' >> app/src/main/AndroidManifest.xml
          echo '    <uses-permission android:name="android.permission.INTERNET" />' >> app/src/main/AndroidManifest.xml
          echo '    <application android:allowBackup="true" android:label="Cinema Player" android:theme="@android:style/Theme.NoTitleBar.Fullscreen">' >> app/src/main/AndroidManifest.xml
          echo '        <activity android:name="com.love.cinemaplayer.MainActivity" android:exported="true" android:screenOrientation="landscape">' >> app/src/main/AndroidManifest.xml
          echo '            <intent-filter>' >> app/src/main/AndroidManifest.xml
          echo '                <action android:name="android.intent.action.MAIN" />' >> app/src/main/AndroidManifest.xml
          echo '                <category android:name="android.intent.category.LAUNCHER" />' >> app/src/main/AndroidManifest.xml
          echo '            </intent-filter>' >> app/src/main/AndroidManifest.xml
          echo '        </activity>' >> app/src/main/application>' >> app/src/main/AndroidManifest.xml
          echo '</manifest>' >> app/src/main/AndroidManifest.xml

          cat << 'EOF' > app/src/main/java/com/love/cinemaplayer/MainActivity.java
          package com.love.cinemaplayer;
          import android.app.Activity;
          import android.net.Uri;
          import android.os.Bundle;
          import android.view.View;
          import android.widget.TextView;
          import android.widget.VideoView;
          import org.eclipse.paho.client.mqttv3.*;
          import org.json.JSONObject;

          public class MainActivity extends Activity {
              private VideoView videoPlayer;
              private TextView infoLabel;
              private MqttAsyncClient client;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  videoPlayer = new VideoView(this);
                  infoLabel = new TextView(this);
                  infoLabel.setText("🎬 WAITING FOR HOST SIGNAL...");
                  infoLabel.setTextSize(20);
                  infoLabel.setTextColor(0xFF89B4FA);
                  
                  android.widget.RelativeLayout layout = new android.widget.RelativeLayout(this);
                  layout.setBackgroundColor(0xFF11111B);
                  
                  android.widget.RelativeLayout.LayoutParams params = new android.widget.RelativeLayout.LayoutParams(
                      android.widget.RelativeLayout.LayoutParams.WRAP_CONTENT, android.widget.RelativeLayout.LayoutParams.WRAP_CONTENT);
                  params.addRule(android.widget.RelativeLayout.CENTER_IN_PARENT);
                  layout.addView(infoLabel, params);
                  layout.addView(videoPlayer, new android.widget.RelativeLayout.LayoutParams(
                      android.widget.RelativeLayout.LayoutParams.MATCH_PARENT, android.widget.RelativeLayout.LayoutParams.MATCH_PARENT));
                  videoPlayer.setVisibility(View.GONE);
                  setContentView(layout);
                  startMqtt();
              }

              private void startMqtt() {
                  try {
                      String clientId = MqttClient.generateClientId();
                      client = new MqttAsyncClient("tcp://broker.emqx.io:1883", clientId, null);
                      MqttConnectOptions options = new MqttConnectOptions();
                      options.setAutomaticReconnect(true);
                      options.setCleanSession(true);
                      client.connect(options, null, new IMqttActionListener() {
                          @Override public void onSuccess(IMqttToken token) { try { client.subscribe("my_cinema/love_cinema_room_secret_999/control", 1); } catch (Exception e) {} }
                          @Override public void onFailure(IMqttToken asyncActionToken, Throwable exception) {}
                      });
                      client.setCallback(new MqttCallbackExtended() {
                          @Override public void connectComplete(boolean reconnect, String serverURI) {}
                          @Override public void connectionLost(Throwable cause) {}
                          @Override public void deliveryComplete(IMqttDeliveryToken token) {}
                          @Override
                          public void messageArrived(String topic, MqttMessage message) throws Exception {
                              JSONObject data = new JSONObject(new String(message.getPayload()));
                              final String action = data.getString("action");
                              final String url = data.optString("url", "");
                              runOnUiThread(() -> {
                                  if (action.equals("load") && !url.isEmpty()) {
                                      infoLabel.setVisibility(View.GONE);
                                      videoPlayer.setVisibility(View.VISIBLE);
                                      videoPlayer.setVideoURI(Uri.parse(url));
                                      videoPlayer.start();
                                  } else if (action.equals("play")) { videoPlayer.start(); }
                                  else if (action.equals("pause")) { videoPlayer.pause(); }
                              });
                          }
                      });
                  } catch (Exception e) {}
              }
          }
          EOF

          echo "include ':app'" > settings.gradle
          
          echo "buildscript {" > build.gradle
          echo "    repositories { google(); mavenCentral() }" >> build.gradle
          echo "    dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }" >> build.gradle
          echo "}" >> build.gradle
          echo "allprojects { repositories { google(); mavenCentral() } }" >> build.gradle

          echo "plugins { id 'com.android.application' }" > app/build.gradle
          echo "android {" >> app/build.gradle
          echo "    namespace 'com.love.cinemaplayer'" >> app/build.gradle
          echo "    compileSdk 34" >> app/build.gradle
          echo "    defaultConfig {" >> app/build.gradle
          echo "        applicationId 'com.love.cinemaplayer'" >> app/build.gradle
          echo "        minSdk 21" >> app/build.gradle
          echo "        targetSdk 34" >> app/build.gradle
          echo "        versionCode 1" >> app/build.gradle
          echo "        versionName '1.0'" >> app/build.gradle
          echo "    }" >> app/build.gradle
          echo "}" >> app/build.gradle
          echo "dependencies { implementation 'org.eclipse.paho:org.eclipse.paho.client.mqttv3:1.2.5' }" >> app/build.gradle

      - name: Setup Gradle Wrapper Automatically
        run: gradle wrapper --gradle-version 8.5

      - name: Setup Gradle Automation
        uses: gradle/actions/setup-gradle@v3

      - name: Build APK with Gradle
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: cinema-player-apk
          path: app/build/outputs/apk/debug/*.apk
